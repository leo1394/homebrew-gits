name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: bash -n bin/gits tests/gits_test.sh
      - name: Run tests
        run: bash tests/gits_test.sh

  homebrew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Formula style
        run: brew style Formula/gits.rb
